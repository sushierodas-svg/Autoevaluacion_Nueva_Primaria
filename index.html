<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autoevaluación Escolaris</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librerías de React estables -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para traducir el código al instante -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas para descargar la imagen PNG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- CSS de Lucide Icons (Fuente de iconos ultra confiable para Canvas) -->
    <link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f9ff; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // Componente de icono corregido con soporte total de colores de Tailwind
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            return (
                <i 
                    className={`icon-${name} ${className}`} 
                    style={{ fontSize: size, width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}
                ></i>
            );
        };

        const App = () => {
            const [formData, setFormData] = useState({
                nombre: '',
                grado: '4° Primaria',
                materia: 'Ciencias Naturales',
                leccion: '',
            });

            const [evaluacion, setEvaluacion] = useState({
                esfuerzo: { ley: false, viVideos: false, hiceTareas: false, fuiPuntual: false },
                comprension: 3,
                sentimiento: 'feliz',
                mejora: { apuntes: false, dudas: false, tiempo: false, repasar: false }
            });

            const [showReport, setShowReport] = useState(false);
            const [isDownloading, setIsDownloading] = useState(false);
            const reportRef = useRef(null);

            const materias = ["Ciencias Naturales", "Formación Ciudadana", "Comunicación y Lenguaje"];
            const grados = ["4° Primaria", "5° Primaria", "6° Primaria"];

            const toggleEsfuerzo = (key) => {
                setEvaluacion(prev => ({
                    ...prev,
                    esfuerzo: { ...prev.esfuerzo, [key]: !prev.esfuerzo[key] }
                }));
            };

            const toggleMejora = (key) => {
                setEvaluacion(prev => ({
                    ...prev,
                    mejora: { ...prev.mejora, [key]: !prev.mejora[key] }
                }));
            };

            const generateReport = () => {
                if (!formData.nombre.trim() || !formData.leccion.trim()) {
                    alert("¡Ups! Por favor escribe tu nombre y el nombre de la lección antes de terminar.");
                    return;
                }
                setShowReport(true);
            };

            const downloadPNG = async () => {
                setIsDownloading(true);
                if (reportRef.current) {
                    try {
                        await new Promise(resolve => setTimeout(resolve, 300));
                        const canvas = await html2canvas(reportRef.current, {
                            backgroundColor: '#ffffff',
                            scale: 2,
                            useCORS: true
                        });
                        const image = canvas.toDataURL("image/png");
                        const link = document.createElement('a');
                        link.href = image;
                        link.download = `Reporte_${formData.nombre.replace(/\s+/g, '_')}.png`;
                        link.click();
                    } catch (err) {
                        console.error("Error:", err);
                        alert("No pudimos generar la imagen. Inténtalo de nuevo.");
                    }
                }
                setIsDownloading(false);
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className="bg-[#1e3a45] text-white p-5 shadow-lg border-b-4 border-[#eab308]">
                        <div className="max-w-4xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-white p-2 rounded-2xl rotate-3 shadow-md flex items-center justify-center">
                                    <LucideIcon name="pen-tool" className="text-[#eab308]" size={24} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black leading-none text-white">ESCOLARIS</h1>
                                    <p className="text-[10px] uppercase tracking-widest text-yellow-400 font-bold">Educación para trascender</p>
                                </div>
                            </div>
                            <div className="hidden sm:flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full border border-white/20">
                                <LucideIcon name="sparkles" size={16} className="text-yellow-300" />
                                <span className="text-xs font-black uppercase tracking-wider">{formData.grado}</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 py-10">
                        <div className="text-center mb-12">
                            <h2 className="text-4xl md:text-5xl font-black text-[#1e3a45] mb-4 drop-shadow-sm">¿Cómo me fue en esta lección? 🎨</h2>
                            <p className="text-lg text-slate-500 font-medium italic">"Toca las opciones que mejor describan tu gran trabajo"</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                            {/* Datos Personales */}
                            <div className="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-blue-400">
                                <div className="mb-6">
                                    <label className="text-xs font-black text-blue-500 uppercase mb-3 block">Mi Nombre</label>
                                    <input type="text" placeholder="Escribe tu nombre..." className="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-2xl font-bold outline-none focus:border-blue-400 transition-all" value={formData.nombre} onChange={e => setFormData({...formData, nombre: e.target.value})} />
                                </div>
                                <div>
                                    <label className="text-xs font-black text-blue-500 uppercase mb-3 block">Mi Grado</label>
                                    <select className="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-2xl font-bold cursor-pointer" value={formData.grado} onChange={e => setFormData({...formData, grado: e.target.value})}>
                                        {grados.map(g => <option key={g} value={g}>{g}</option>)}
                                    </select>
                                </div>
                            </div>

                            {/* Datos Lección */}
                            <div className="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-amber-400">
                                <div className="mb-6">
                                    <label className="text-xs font-black text-amber-600 uppercase mb-3 block">Materia</label>
                                    <select className="w-full p-4 bg-amber-50 border-2 border-amber-100 rounded-2xl font-bold cursor-pointer" value={formData.materia} onChange={e => setFormData({...formData, materia: e.target.value})}>
                                        {materias.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-xs font-black text-amber-600 uppercase mb-3 block">Nombre de la Lección</label>
                                    <input type="text" placeholder="Ej. Los Seres Vivos" className="w-full p-4 bg-amber-50 border-2 border-amber-100 rounded-2xl font-bold outline-none focus:border-amber-400 transition-all" value={formData.leccion} onChange={e => setFormData({...formData, leccion: e.target.value})} />
                                </div>
                            </div>
                        </div>

                        {/* Mi Esfuerzo */}
                        <section className="bg-white p-10 rounded-[2.5rem] shadow-xl border-b-8 border-slate-100 mb-10">
                            <h3 className="text-2xl font-black text-[#1e3a45] mb-8 flex items-center gap-3">
                                <span className="bg-purple-100 p-2 rounded-xl">🚀</span> Mi Esfuerzo
                            </h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                {[
                                    { id: 'ley', label: 'Leí contenido', icon: 'book-open', color: 'bg-emerald-500' },
                                    { id: 'viVideos', label: 'Vi videos', icon: 'video', color: 'bg-sky-500' },
                                    { id: 'hiceTareas', label: 'Hice tareas', icon: 'pen-tool', color: 'bg-indigo-500' },
                                    { id: 'fuiPuntual', label: 'Fui puntual', icon: 'clock', color: 'bg-rose-500' }
                                ].map(item => (
                                    <button 
                                        key={item.id} 
                                        onClick={() => toggleEsfuerzo(item.id)} 
                                        className={`flex flex-col items-center p-6 rounded-[2rem] border-b-4 transition-all transform active:scale-95 ${evaluacion.esfuerzo[item.id] ? `${item.color} text-white shadow-lg border-black/10` : 'bg-slate-50 text-slate-400 border-slate-100'}`}
                                    >
                                        <LucideIcon name={item.icon} size={32} className="mb-3" />
                                        <span className="text-[10px] font-black uppercase text-center leading-none">{item.label}</span>
                                    </button>
                                ))}
                            </div>
                        </section>

                        {/* Mi Sentimiento */}
                        <section className="bg-white p-10 rounded-[2.5rem] shadow-xl border-b-8 border-slate-100 mb-10 text-center">
                            <h3 className="text-2xl font-black text-[#1e3a45] mb-8">🌈 ¿Cómo me sentí?</h3>
                            <div className="flex justify-center gap-8 md:gap-16">
                                {[
                                    { id: 'feliz', emoji: '😄', label: '¡Feliz!' },
                                    { id: 'neutral', emoji: '😐', label: 'Normal' },
                                    { id: 'triste', emoji: '😔', label: 'Cansado' }
                                ].map(s => (
                                    <button 
                                        key={s.id} 
                                        onClick={() => setEvaluacion({...evaluacion, sentimiento: s.id})}
                                        className={`flex flex-col items-center transition-all transform hover:scale-110 ${evaluacion.sentimiento === s.id ? 'scale-125' : 'grayscale opacity-40'}`}
                                    >
                                        <span className="text-6xl mb-2 drop-shadow-sm">{s.emoji}</span>
                                        <span className={`text-[10px] font-black uppercase tracking-widest ${evaluacion.sentimiento === s.id ? 'text-[#1e3a45]' : 'text-slate-400'}`}>
                                            {s.label}
                                        </span>
                                    </button>
                                ))}
                            </div>
                        </section>

                        {/* Cómo puedo mejorar */}
                        <section className="bg-white p-10 rounded-[2.5rem] shadow-xl border-b-8 border-slate-100 mb-10">
                            <h3 className="text-2xl font-black text-[#1e3a45] mb-8 flex items-center gap-3">
                                <span className="bg-amber-100 p-2 rounded-xl">🎯</span> ¿Cómo puedo mejorar?
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {[
                                    { id: 'apuntes', label: 'Tomar mejores apuntes', icon: '📝' },
                                    { id: 'dudas', label: 'Preguntar más mis dudas', icon: '🙋‍♂️' },
                                    { id: 'tiempo', label: 'Organizar mejor mi tiempo', icon: '⏰' },
                                    { id: 'repasar', label: 'Repasar más en casa', icon: '📖' }
                                ].map(item => (
                                    <button 
                                        key={item.id}
                                        onClick={() => toggleMejora(item.id)}
                                        className={`flex items-center gap-4 p-5 rounded-2xl border-2 transition-all text-left ${evaluacion.mejora[item.id] ? 'bg-amber-500 border-amber-600 text-white shadow-md' : 'bg-slate-50 border-slate-100 text-slate-500 hover:border-amber-200'}`}
                                    >
                                        <span className="text-2xl">{item.icon}</span>
                                        <span className="font-bold text-sm">{item.label}</span>
                                        {evaluacion.mejora[item.id] && <div className="ml-auto bg-white/20 p-1 rounded-full"><LucideIcon name="check" size={14} /></div>}
                                    </button>
                                ))}
                            </div>
                        </section>

                        {/* Comprensión */}
                        <section className="bg-white p-10 rounded-[2.5rem] shadow-xl border-b-8 border-slate-100 mb-12 text-center">
                            <h3 className="text-2xl font-black text-[#1e3a45] mb-8">💡 ¿Cuánto aprendí?</h3>
                            <div className="flex justify-center gap-4 mb-6">
                                {[1, 2, 3, 4, 5].map(star => (
                                    <button key={star} onClick={() => setEvaluacion(prev => ({...prev, comprension: star}))} className={`transition-all transform hover:scale-125 ${evaluacion.comprension >= star ? 'text-yellow-400 drop-shadow-md' : 'text-slate-200'}`}>
                                        <LucideIcon name="star" size={60} className={evaluacion.comprension >= star ? "text-yellow-400" : "text-slate-200"} />
                                    </button>
                                ))}
                            </div>
                            <div className="inline-block bg-[#1e3a45] text-white px-8 py-2 rounded-full font-black text-sm uppercase tracking-widest shadow-lg">
                                {evaluacion.comprension === 5 ? "🌟 ¡Soy experto! 🌟" : evaluacion.comprension >= 3 ? "👍 ¡Entendí bien! 👍" : "🤔 Necesito repasar"}
                            </div>
                        </section>

                        {/* Botones */}
                        <div className="flex flex-col sm:flex-row gap-6 justify-center">
                            <button onClick={() => window.location.reload()} className="px-8 py-5 rounded-[1.5rem] border-4 border-slate-200 text-slate-400 font-black hover:bg-white hover:text-rose-500 hover:border-rose-200 transition-all shadow-md">REINICIAR</button>
                            <button onClick={generateReport} className="px-16 py-5 rounded-[1.5rem] bg-[#eab308] text-[#1e3a45] font-black text-xl shadow-[0_10px_0_0_#ca8a04] hover:-translate-y-1 active:translate-y-1 active:shadow-none transition-all">¡FINALIZAR MI TRABAJO!</button>
                        </div>

                        {/* REPORTE FINAL */}
                        {showReport && (
                            <div className="fixed inset-0 bg-[#1e3a45]/95 backdrop-blur-xl z-50 flex flex-col items-center justify-center p-4 overflow-y-auto">
                                <div ref={reportRef} className="bg-white rounded-[2.5rem] max-w-lg w-full overflow-hidden shadow-2xl border-8 border-white mb-6 transform scale-100 transition-transform duration-300">
                                    <div className="bg-[#1e3a45] p-8 text-center text-white relative">
                                        <LucideIcon name="award" size={64} className="mx-auto text-yellow-400 mb-4" />
                                        <h4 className="text-2xl font-black">INSIGNIA DE LOGRO</h4>
                                        <p className="text-yellow-400 text-[10px] font-black uppercase tracking-widest">ESCOLARIS • {formData.grado}</p>
                                    </div>
                                    <div className="p-8 space-y-4">
                                        <div className="bg-blue-50 p-4 rounded-xl flex justify-between items-center font-black text-[#1e3a45]">
                                            <span className="text-blue-400 text-[10px] uppercase">Alumno:</span>
                                            <span>{formData.nombre}</span>
                                        </div>
                                        <div className="bg-amber-50 p-4 rounded-xl text-center font-black text-[#1e3a45]">
                                            <p className="text-amber-600 text-[10px] uppercase mb-1">{formData.materia}</p>
                                            <p className="text-lg">"{formData.leccion}"</p>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-purple-50 p-4 rounded-xl text-center border-2 border-purple-100">
                                                <span className="block text-[10px] font-black text-purple-400 uppercase mb-1">Mi Ánimo</span>
                                                <span className="text-3xl">{evaluacion.sentimiento === 'feliz' ? '😄' : evaluacion.sentimiento === 'neutral' ? '😐' : '😔'}</span>
                                            </div>
                                            <div className="bg-yellow-50 p-4 rounded-xl text-center border-2 border-yellow-100">
                                                <span className="block text-[10px] font-black text-yellow-600 uppercase mb-1">Aprendizaje</span>
                                                <div className="flex justify-center text-yellow-400 gap-1 mt-2">
                                                    {[...Array(evaluacion.comprension)].map((_, i) => <LucideIcon key={i} name="star" size={16} className="text-yellow-400" />)}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-3">
                                            <div className="bg-slate-50 p-4 rounded-xl border-2 border-dashed border-slate-200">
                                                <h5 className="text-[10px] font-black text-slate-400 uppercase text-center mb-2">Lo que logré hoy:</h5>
                                                <div className="flex flex-wrap justify-center gap-2">
                                                    {evaluacion.esfuerzo.ley && <span className="bg-emerald-500 text-white px-2 py-1 rounded-full text-[8px] font-black uppercase">Lectura ✓</span>}
                                                    {evaluacion.esfuerzo.viVideos && <span className="bg-sky-500 text-white px-2 py-1 rounded-full text-[8px] font-black uppercase">Videos ✓</span>}
                                                    {evaluacion.esfuerzo.hiceTareas && <span className="bg-indigo-500 text-white px-2 py-1 rounded-full text-[8px] font-black uppercase">Tareas ✓</span>}
                                                    {evaluacion.esfuerzo.fuiPuntual && <span className="bg-rose-500 text-white px-2 py-1 rounded-full text-[8px] font-black uppercase">Puntual ✓</span>}
                                                </div>
                                            </div>

                                            {Object.values(evaluacion.mejora).some(v => v) && (
                                                <div className="bg-amber-50 p-4 rounded-xl border-2 border-amber-100">
                                                    <h5 className="text-[10px] font-black text-amber-500 uppercase text-center mb-2">Mi compromiso para mejorar:</h5>
                                                    <div className="flex flex-wrap justify-center gap-2">
                                                        {evaluacion.mejora.apuntes && <span className="text-[9px] font-bold text-amber-700">📝 Apuntes</span>}
                                                        {evaluacion.mejora.dudas && <span className="text-[9px] font-bold text-amber-700">🙋‍♂️ Dudas</span>}
                                                        {evaluacion.mejora.tiempo && <span className="text-[9px] font-bold text-amber-700">⏰ Tiempo</span>}
                                                        {evaluacion.mejora.repasar && <span className="text-[9px] font-bold text-amber-700">📖 Repasar</span>}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="bg-yellow-50 p-3 text-center border-t border-yellow-100">
                                        <p className="text-[9px] text-amber-600 font-black uppercase tracking-tighter italic">"¡Sigue esforzándote, vas por un gran camino!"</p>
                                        <p className="text-[8px] text-amber-400 font-bold uppercase mt-1">{new Date().toLocaleDateString()}</p>
                                    </div>
                                </div>

                                <div className="max-w-lg w-full space-y-4">
                                    <div className="bg-white/10 border border-white/20 p-6 rounded-[2rem] text-white">
                                        <h5 className="text-center font-black text-yellow-400 uppercase mb-4 tracking-widest flex items-center justify-center gap-2">
                                            <LucideIcon name="share-2" size={18} className="text-yellow-400" /> ¿Cómo entregar tu tarea?
                                        </h5>
                                        <div className="space-y-3 text-xs font-bold">
                                            <div className="flex items-center gap-3"><div className="bg-yellow-400 text-[#1e3a45] w-6 h-6 rounded-full flex items-center justify-center font-black shrink-0">1</div> Pulsa "DESCARGAR REPORTE".</div>
                                            <div className="flex items-center gap-3"><div className="bg-yellow-400 text-[#1e3a45] w-6 h-6 rounded-full flex items-center justify-center font-black shrink-0">2</div> Busca la foto en tus descargas.</div>
                                            <div className="flex items-center gap-3"><div className="bg-yellow-400 text-[#1e3a45] w-6 h-6 rounded-full flex items-center justify-center font-black shrink-0">3</div> Sube la foto a la plataforma.</div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col sm:flex-row gap-4">
                                        <button onClick={() => setShowReport(false)} className="flex-1 py-4 rounded-2xl border-2 border-white/20 text-white font-black uppercase tracking-widest hover:bg-white/10 transition-all">Regresar</button>
                                        <button onClick={downloadPNG} disabled={isDownloading} className="flex-[2] py-4 rounded-2xl bg-green-500 text-white font-black uppercase tracking-widest flex items-center justify-center gap-3 shadow-xl hover:bg-green-400 active:scale-95 transition-all">
                                            {isDownloading ? "Cargando..." : (
                                                <React.Fragment><LucideIcon name="download" size={18} /> DESCARGAR REPORTE (PNG)</React.Fragment>
                                            )}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
